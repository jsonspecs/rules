name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      # actions/checkout@v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      # actions/setup-node@v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Use npm with trusted publishing support
        run: npm install --global npm@11.18.0
      - name: Verify tag and package version
        run: |
          test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./package.json').version")"
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - run: npm ci
      - run: npm test
      - run: npm run test:conformance
      - run: npm run test:pack
      - run: npm run test:perf
      - run: npm audit --omit=dev
      - name: Build reviewable npm tarball
        run: |
          mkdir -p "$RUNNER_TEMP/release"
          npm pack --pack-destination "$RUNNER_TEMP/release"
      - run: npm publish --access public --tag latest --provenance
      - name: Verify scoped package is available
        run: |
          for attempt in $(seq 1 18); do
            version="$(npm view @jsonspecs/rules@${GITHUB_REF_NAME#v} version 2>/dev/null || true)"
            if [ "$version" = "${GITHUB_REF_NAME#v}" ]; then
              exit 0
            fi
            echo "waiting for @jsonspecs/rules@${GITHUB_REF_NAME#v} to appear in npm (${attempt}/18)"
            sleep 10
          done
          npm view @jsonspecs/rules@${GITHUB_REF_NAME#v} version
      - name: Create GitHub release
        env:
          GH_TOKEN: "${{ github.token }}"
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag "$RUNNER_TEMP/release/jsonspecs-rules-${GITHUB_REF_NAME#v}.tgz"
