name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Read pinned specification commit
        id: spec
        run: echo "commit=$(tr -d '\r\n' < tests/conformance/spec-commit.txt)" >> "$GITHUB_OUTPUT"

      - name: Check out pinned conformance source
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: jsonspecs/spec
          ref: ${{ steps.spec.outputs.commit }}
          path: .conformance-spec
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        # actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run normative RC.6 conformance suite
        run: npm run test:conformance

      - name: Run smoke example
        run: npm run test:smoke

      - name: Verify package
        run: npm run test:pack

      - name: Dependency audit
        run: npm audit --omit=dev
